<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Sign Up - SoleHaus</title>
<meta name="description" content="Create a new SoleHaus admin account.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="icon" type="image/svg+xml" href="../assets/images/brands/solehaus-logo.svg">
<link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body>
<button class="btn-icon auth-toggle" id="rtlToggle" aria-label="Switch to right-to-left"><i class="fa-solid fa-align-left"></i></button>
<main class="auth-page">
  <section class="auth-card" aria-labelledby="signupTitle">
    <div class="auth-logo">
      <a class="brand-logo" href="index.html"><i class="fa-solid fa-shoe-prints"></i> SoleHaus</a>
    </div>
    <h1 class="auth-card-title text-center" id="signupTitle"><i class="fa-solid fa-user-shield me-2"></i>Admin Sign Up</h1>
    <p class="auth-helper text-center">Create a new SoleHaus admin account.</p>
    <div class="auth-alert success d-none" id="signupMessage" role="status"></div>
    <form id="adminSignupForm" novalidate>
      <div class="mb-3">
        <label for="fullName" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="fullName" name="fullName" autocomplete="name" required>
        <small class="field-error" id="fullNameErr"></small>
      </div>
      <div class="mb-3">
        <label for="signupEmail" class="form-label">Admin Email</label>
        <input type="email" class="form-control" id="signupEmail" name="email" autocomplete="email" required>
        <small class="field-error" id="signupEmailErr"></small>
      </div>
      <div class="mb-3">
        <label for="signupPassword" class="form-label">Password</label>
        <input type="password" class="form-control" id="signupPassword" name="password" autocomplete="new-password" required>
        <small class="field-error" id="signupPasswordErr"></small>
      </div>
      <div class="mb-4">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
        <small class="field-error" id="confirmPasswordErr"></small>
      </div>
      <button type="submit" class="btn btn-primary-orange w-100">Create Admin Account</button>
      <div class="social-auth-divider"><span>or continue with</span></div>
      <div class="social-auth-buttons">
        <button type="button" class="btn-social" id="googleAdminSignupBtn"><i class="fa-brands fa-google"></i> Google</button>
        <button type="button" class="btn-social" id="appleAdminSignupBtn"><i class="fa-brands fa-apple"></i> Apple</button>
      </div>
    </form>
    <p class="text-center mt-4 mb-0">Already have an account? <a href="admin-signin.html">Sign In</a></p>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/main.js"></script>
<script>
  document.getElementById('googleAdminSignupBtn').addEventListener('click', function () {
    setAuthMessage('signupMessage', 'Demo only — Google sign-up is not connected in this template.', 'success');
  });
  document.getElementById('appleAdminSignupBtn').addEventListener('click', function () {
    setAuthMessage('signupMessage', 'Demo only — Apple sign-up is not connected in this template.', 'success');
  });
</script>
</body>
</html>
