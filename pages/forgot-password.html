<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password — SoleHaus</title>
<meta name="description" content="Reset your SoleHaus account password. Template demo page.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body>
<button class="btn-icon auth-toggle" id="themeToggle" aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
<button class="btn-icon auth-toggle" id="rtlToggle" aria-label="Switch to right-to-left"><i class="fa-solid fa-align-left"></i></button>
<main class="auth-page">
  <section class="auth-card" aria-labelledby="forgotTitle">
    <div class="auth-logo">
      <a class="brand-logo" href="index.html"><i class="fa-solid fa-shoe-prints"></i> SoleHaus</a>
    </div>
    <h1 class="auth-card-title text-center" id="forgotTitle">Forgot password?</h1>
    <p class="auth-helper text-center">Enter your email and we'll send a reset link.</p>
    <div class="auth-alert success d-none" id="forgotMessage" role="status"></div>
    <form id="forgotForm" novalidate>
      <div class="mb-4">
        <label for="forgotEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="forgotEmail" name="email" autocomplete="email" required>
        <small class="field-error" id="forgotEmailErr"></small>
      </div>
      <button type="submit" class="btn btn-primary-orange w-100">Send Reset Link</button>
    </form>
    <a href="signin.html" class="btn btn-outline-orange w-100 mt-3">Back to Login</a>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/main.js"></script>
<script>
  /* This is a standalone template demo page — it is not wired to any real
     account system. Shopping and checkout on this site do not require an
     account (see the Shop and Checkout pages). */
  document.getElementById('forgotForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const email = document.getElementById('forgotEmail').value.trim();
    const emailErr = document.getElementById('forgotEmailErr');
    const msg = document.getElementById('forgotMessage');
    const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

    if (!emailValid) { emailErr.textContent = 'Enter a valid email'; msg.classList.add('d-none'); return; }
    emailErr.textContent = '';

    msg.textContent = 'Demo only — no email is actually sent from this template page.';
    msg.className = 'auth-alert success';
  });
</script>
</body>
</html>
