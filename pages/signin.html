<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — SoleHaus</title>
<meta name="description" content="Login to SoleHaus. Template demo page.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body>
<button class="btn-icon auth-toggle" id="themeToggle" aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
<button class="btn-icon auth-toggle" id="rtlToggle" aria-label="Switch to right-to-left"><i class="fa-solid fa-align-left"></i></button>
<main class="auth-page">
  <section class="auth-card" aria-labelledby="loginTitle">
    <div class="auth-logo">
      <a class="brand-logo" href="index.html"><i class="fa-solid fa-shoe-prints"></i> SoleHaus</a>
    </div>
    <h1 class="auth-card-title text-center" id="loginTitle">Welcome back</h1>
    <p class="auth-helper text-center">Login to your SoleHaus account.</p>
    <div class="auth-alert success d-none" id="loginMessage" role="status"></div>
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="loginEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="loginEmail" name="email" autocomplete="email" required>
        <small class="field-error" id="loginEmailErr"></small>
      </div>
      <div class="mb-2">
        <label for="loginPassword" class="form-label">Password</label>
        <input type="password" class="form-control" id="loginPassword" name="password" autocomplete="current-password" required>
        <small class="field-error" id="loginPasswordErr"></small>
      </div>
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe" name="remember">
          <label class="form-check-label" for="rememberMe">Remember me</label>
        </div>
        <a href="forgot-password.html">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary-orange w-100">Login</button>
    </form>
    <p class="text-center mt-4 mb-0">Don't have an account? <a href="signup.html">Register</a></p>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/main.js"></script>
<script>
  /* This is a standalone template demo page — it is not wired to any real
     account system. Shopping and checkout on this site do not require an
     account (see the Shop and Checkout pages). */
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const emailErr = document.getElementById('loginEmailErr');
    const passwordErr = document.getElementById('loginPasswordErr');
    const msg = document.getElementById('loginMessage');
    const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    let ok = true;

    if (!emailValid) { emailErr.textContent = 'Enter a valid email'; ok = false; } else { emailErr.textContent = ''; }
    if (!password) { passwordErr.textContent = 'Password is required'; ok = false; } else { passwordErr.textContent = ''; }

    if (!ok) { msg.classList.add('d-none'); return; }

    msg.textContent = 'Demo only — this template page does not create a real session.';
    msg.className = 'auth-alert success';
  });
</script>
</body>
</html>
