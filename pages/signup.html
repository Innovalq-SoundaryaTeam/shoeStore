<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register — SoleHaus</title>
<meta name="description" content="Create a SoleHaus account. Template demo page.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body>
<button class="btn-icon auth-toggle" id="themeToggle" aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
<button class="btn-icon auth-toggle" id="rtlToggle" aria-label="Switch to right-to-left"><i class="fa-solid fa-align-left"></i></button>
<main class="auth-page">
  <section class="auth-card" aria-labelledby="registerTitle">
    <div class="auth-logo">
      <a class="brand-logo" href="index.html"><i class="fa-solid fa-shoe-prints"></i> SoleHaus</a>
    </div>
    <h1 class="auth-card-title text-center" id="registerTitle">Create account</h1>
    <p class="auth-helper text-center">Register a SoleHaus account.</p>
    <div class="auth-alert success d-none" id="registerMessage" role="status"></div>
    <form id="registerForm" novalidate>
      <div class="mb-3">
        <label for="registerName" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="registerName" name="fullName" autocomplete="name" required>
        <small class="field-error" id="registerNameErr"></small>
      </div>
      <div class="mb-3">
        <label for="registerEmail" class="form-label">Email</label>
        <input type="email" class="form-control" id="registerEmail" name="email" autocomplete="email" required>
        <small class="field-error" id="registerEmailErr"></small>
      </div>
      <div class="mb-3">
        <label for="registerPassword" class="form-label">Password</label>
        <input type="password" class="form-control" id="registerPassword" name="password" autocomplete="new-password" required>
        <small class="field-error" id="registerPasswordErr"></small>
      </div>
      <div class="mb-4">
        <label for="registerConfirm" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="registerConfirm" name="confirmPassword" autocomplete="new-password" required>
        <small class="field-error" id="registerConfirmErr"></small>
      </div>
      <button type="submit" class="btn btn-primary-orange w-100">Register</button>
    </form>
    <p class="text-center mt-4 mb-0">Already have an account? <a href="signin.html">Login</a></p>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/main.js"></script>
<script>
  /* This is a standalone template demo page — it is not wired to any real
     account system. Shopping and checkout on this site do not require an
     account (see the Shop and Checkout pages). */
  document.getElementById('registerForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const name = document.getElementById('registerName').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const confirm = document.getElementById('registerConfirm').value;
    const nameErr = document.getElementById('registerNameErr');
    const emailErr = document.getElementById('registerEmailErr');
    const passwordErr = document.getElementById('registerPasswordErr');
    const confirmErr = document.getElementById('registerConfirmErr');
    const msg = document.getElementById('registerMessage');
    const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    let ok = true;

    if (!name) { nameErr.textContent = 'Full name is required'; ok = false; } else { nameErr.textContent = ''; }
    if (!emailValid) { emailErr.textContent = 'Enter a valid email'; ok = false; } else { emailErr.textContent = ''; }
    if (password.length < 6) { passwordErr.textContent = 'Password must be at least 6 characters'; ok = false; } else { passwordErr.textContent = ''; }
    if (confirm !== password) { confirmErr.textContent = 'Passwords must match'; ok = false; } else { confirmErr.textContent = ''; }

    if (!ok) { msg.classList.add('d-none'); return; }

    msg.textContent = 'Demo only — this template page does not create a real account.';
    msg.className = 'auth-alert success';
  });
</script>
</body>
</html>
